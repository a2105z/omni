# Deploy Omni to Vercel via GitHub integration
# 1. Connect this repo at https://vercel.com (Import Project)
# 2. Add env vars in Vercel dashboard
# 3. Vercel auto-deploys on push to main
# Alternative: Use Vercel CLI with vercel --prod

name: Deploy to Vercel

on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Build check passed
        run: echo "✓ Omni builds successfully. Connect this repo to Vercel for deployment."
